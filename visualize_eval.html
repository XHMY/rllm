        const colors = [
            "#e6194b", "#3cb44b", "#4363d8", "#f58231", "#911eb4",
            "#42d4f4", "#f032e6", "#bfef45", "#fabed4", "#469990",
            "#dcbeff", "#9A6324", "#fffac8", "#800000", "#aaffc3",
            "#808000", "#ffd8b1", "#000075", "#a9a9a9", "#000000"
        ];

        let chartInstance = null;
        let currentSort = { key: "checkpoint_step", asc: true };

        function init() {
            populateFilters();
            updateView();

            document.getElementById("datasetFilter").addEventListener("change", updateView);
            document.getElementById("workflowFilter").addEventListener("change", updateView);
            document.getElementById("modelNameFilter").addEventListener("change", updateView);
            document.getElementById("sharePolicyFilter").addEventListener("change", updateView);
            document.getElementById("perAgentRewardFilter").addEventListener("change", updateView);
            document.getElementById("groupBy").addEventListener("change", updateView);

            document.querySelectorAll("#dataTable th").forEach(th => {
                th.addEventListener("click", () => {
                    const key = th.dataset.key;
                    if (currentSort.key === key) {
                        currentSort.asc = !currentSort.asc;
                    } else {
                        currentSort.key = key;
                        currentSort.asc = true;
                    }
                    updateView();
                });
            });
        }

        function populateFilters() {
            const datasets = new Set();
            const workflows = new Set();
            const models = new Set();
            const policies = new Set();
            const parValues = new Set();

            allData.forEach(item => {
                if (item.dataset) datasets.add(item.dataset);
                if (item.workflow_type) workflows.add(item.workflow_type);
                if (item.model_name) models.add(item.model_name);
                if (item.share_policy !== undefined) policies.add(item.share_policy.toString());
                if (item.per_agent_reward !== undefined) parValues.add(item.per_agent_reward.toString());
            });

            const fillSelect = (id, set) => {
                const select = document.getElementById(id);
                Array.from(set).sort().forEach(val => {
                    const option = document.createElement("option");
                    option.value = val;
                    option.textContent = val;
                    select.appendChild(option);
                });
            };

            fillSelect("datasetFilter", datasets);
            fillSelect("workflowFilter", workflows);
            fillSelect("modelNameFilter", models);
            fillSelect("sharePolicyFilter", policies);
            fillSelect("perAgentRewardFilter", parValues);
        }

        function getFilteredData() {
            const datasetFilter = document.getElementById("datasetFilter").value;
            const workflowFilter = document.getElementById("workflowFilter").value;
            const modelNameFilter = document.getElementById("modelNameFilter").value;
            const sharePolicyFilter = document.getElementById("sharePolicyFilter").value;
            const perAgentRewardFilter = document.getElementById("perAgentRewardFilter").value;

            return allData.filter(item => {
                if (datasetFilter !== "all" && item.dataset !== datasetFilter) return false;
                if (workflowFilter !== "all" && item.workflow_type !== workflowFilter) return false;
                if (modelNameFilter !== "all" && item.model_name !== modelNameFilter) return false;
                if (sharePolicyFilter !== "all" && (item.share_policy === undefined || item.share_policy.toString() !== sharePolicyFilter)) return false;
                if (perAgentRewardFilter !== "all" && (item.per_agent_reward === undefined || item.per_agent_reward.toString() !== perAgentRewardFilter)) return false;
                return true;
            });
        }

        function updateView() {
            const filtered = getFilteredData();
            updateChart(filtered);
            updateTable(filtered);
        }

        function updateChart(filteredData) {
            const groupBy = document.getElementById("groupBy").value;

            const grouped = {};
            filteredData.forEach(item => {
                const groupKey = item[groupBy] || "Unknown";
                if (!grouped[groupKey]) grouped[groupKey] = [];
                grouped[groupKey].push(item);
            });

            Object.keys(grouped).forEach(key => {
                grouped[key].sort((a, b) => a.checkpoint_step - b.checkpoint_step);
            });

            const datasets = Object.keys(grouped).sort().map((groupKey, index) => {
                const dataPoints = grouped[groupKey].map(item => ({
                    x: item.checkpoint_step,
                    y: item.mean_accuracy,
                    ...item
                }));
                return {
                    label: groupKey,
                    data: dataPoints,
                    borderColor: colors[index % colors.length],
                    backgroundColor: colors[index % colors.length] + "40",
                    borderWidth: 2,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    fill: false,
                    tension: 0.1
                };
            });

            const ctx = document.getElementById("accuracyChart").getContext("2d");
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: "line",
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: "index", intersect: false },
                    plugins: {
                        title: { display: true, text: "Mean Accuracy vs Checkpoint Step" },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const p = context.raw;
                                    let lines = [
                                        "Group: " + context.dataset.label,
                                        "Step: " + p.checkpoint_step,
                                        "Mean Accuracy: " + p.y.toFixed(4),
                                    ];
                                    if (p.experiment_name) lines.push("Experiment: " + p.experiment_name);
                                    if (p.accuracy !== undefined) lines.push("Raw Accuracy: " + p.accuracy.toFixed(4));
                                    return lines;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: "linear",
                            title: { display: true, text: "Checkpoint Step", font: { weight: "bold", size: 14 } },
                            ticks: { precision: 0 }
                        },
                        y: {
                            title: { display: true, text: "Mean Accuracy", font: { weight: "bold", size: 14 } }
                        }
                    }
                }
            });
        }

        function updateTable(filteredData) {
            const sorted = [...filteredData].sort((a, b) => {
                let va = a[currentSort.key];
                let vb = b[currentSort.key];
                if (va === undefined) va = "";
                if (vb === undefined) vb = "";
                if (typeof va === "number" && typeof vb === "number") {
                    return currentSort.asc ? va - vb : vb - va;
                }
                va = String(va); vb = String(vb);
                return currentSort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
            });

            document.getElementById("countLabel").textContent = "Showing " + sorted.length + " of " + allData.length + " entries";

            // Update sort arrows
            document.querySelectorAll("#dataTable th").forEach(th => {
                const arrow = th.querySelector(".sort-arrow");
                if (th.dataset.key === currentSort.key) {
                    arrow.textContent = currentSort.asc ? " \u25B2" : " \u25BC";
                } else {
                    arrow.textContent = "";
                }
            });

            const tbody = document.getElementById("tableBody");
            const fmt = (v, digits) => v !== undefined && v !== null ? Number(v).toFixed(digits) : "-";

            tbody.innerHTML = sorted.map(item => "<tr>" +
                "<td>" + (item.dataset || "-") + "</td>" +
                "<td>" + (item.experiment_name || "-") + "</td>" +
                "<td>" + (item.workflow_type || "-") + "</td>" +
                "<td>" + (item.model_name || "-") + "</td>" +
                "<td>" + (item.checkpoint_step !== undefined ? item.checkpoint_step : "-") + "</td>" +
                "<td>" + fmt(item.mean_accuracy, 4) + "</td>" +
                "<td>" + fmt(item.accuracy, 4) + "</td>" +
                "<td>" + fmt(item.std_accuracy, 4) + "</td>" +
                "<td>" + fmt(item.pass_at_n, 4) + "</td>" +
                "<td>" + (item.num_correct !== undefined ? item.num_correct : "-") + "</td>" +
                "<td>" + (item.num_total !== undefined ? item.num_total : "-") + "</td>" +
                "<td>" + (item.share_policy !== undefined ? item.share_policy : "-") + "</td>" +
                "<td>" + (item.per_agent_reward !== undefined ? item.per_agent_reward : "-") + "</td>" +
                "<td>" + (item.n_rollouts !== undefined ? item.n_rollouts : "-") + "</td>" +
            "</tr>").join("");
        }

        window.addEventListener("DOMContentLoaded", init);
    </script>
